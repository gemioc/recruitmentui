<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" id="favicon-link" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电视招聘展示系统</title>
    <script>
      // 动态加载系统Logo作为favicon
      (function() {
        const logo = localStorage.getItem('systemLogo');
        if (logo) {
          document.getElementById('favicon-link').href = logo;
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
